server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 폴백 — /events/:id 직접 접속 시 index.html 반환
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
